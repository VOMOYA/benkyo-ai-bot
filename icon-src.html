<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden}
  .icon{
    width:100vw;height:100vh;
    background:linear-gradient(135deg,#3b82f6 0%,#2563eb 55%,#1d4ed8 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,"Segoe UI","Yu Gothic UI",sans-serif;
  }
  .label{
    color:#fff;font-weight:900;font-size:38vw;letter-spacing:1vw;line-height:1;
    text-shadow:0 2vw 5vw rgba(0,0,0,.3);
  }
  .sub{
    color:#dbeafe;font-weight:800;font-size:11vw;letter-spacing:.5vw;margin-top:4vw;line-height:1;
  }
</style>
</head>
<body>
  <div class="icon">
    <div class="label">AI</div>
    <div class="sub">べんきょう</div>
  </div>
</body>
</html>
